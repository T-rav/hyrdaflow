# HydraFlow services — run `docker compose up hindsight` to start Hindsight.
#
# Hindsight provides semantic memory (retain/recall/reflect) for agents.
# See https://github.com/vectorize-io/hindsight for details.
#
# Required env vars (set in .env or export before running):
#   HINDSIGHT_LLM_API_KEY  — API key for the LLM provider (e.g. OpenAI)
#
# Optional:
#   HINDSIGHT_LLM_PROVIDER — openai (default), anthropic, gemini, groq, ollama

services:
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    pull_policy: always
    ports:
      - "8888:8888"   # API
      - "9999:9999"   # Control plane UI
    environment:
      - HINDSIGHT_API_LLM_API_KEY=${HINDSIGHT_LLM_API_KEY:-}
      - HINDSIGHT_API_LLM_PROVIDER=${HINDSIGHT_LLM_PROVIDER:-openai}
    volumes:
      - hindsight-data:/home/hindsight/.pg0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  hindsight-data:
    driver: local
