name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      ui: ${{ steps.filter.outputs.ui }}
      ci: ${{ steps.filter.outputs.ci }}
      service_registry: ${{ steps.filter.outputs.service_registry }}
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      mockworld: ${{ steps.filter.outputs.mockworld }}
      dockerfiles: ${{ steps.filter.outputs.dockerfiles }}
      compose: ${{ steps.filter.outputs.compose }}
      sandbox_scenarios: ${{ steps.filter.outputs.sandbox_scenarios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'src/**/*.py'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
            ui:
              - 'src/ui/**'
            ci:
              - '.github/workflows/**'
            service_registry:
              - 'src/service_registry.py'
            orchestrator:
              - 'src/orchestrator.py'
            mockworld:
              - 'src/mockworld/**'
            dockerfiles:
              - 'Dockerfile*'
            compose:
              - 'docker-compose*.yml'
            sandbox_scenarios:
              - 'tests/sandbox_scenarios/**'

  lint:
    name: Lint & Format
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format . --check

  typecheck:
    name: Type Check
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Pyright
        run: uv run pyright

  security:
    name: Security Scan
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Bandit security scan
        run: uv run bandit -c pyproject.toml -r . --severity-level medium

  test:
    name: Tests
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Warning gate (targeted)
        run: PYTHONPATH=src uv run pytest tests/test_execution.py tests/test_agent_advanced.py tests/test_agent_cli.py tests/test_agent_execution.py tests/test_agent_lifecycle.py tests/test_agent_output.py tests/test_hitl_runner.py tests/test_prompt_telemetry.py tests/test_dashboard_routes_control.py tests/test_dashboard_routes_core.py tests/test_dashboard_routes_hitl.py tests/test_dashboard_routes_issue_history.py tests/test_dashboard_routes_metrics.py tests/test_dashboard_routes_repo.py tests/test_dashboard_routes_state.py -W error::RuntimeWarning -W error::pytest.PytestUnraisableExceptionWarning
      - name: Run tests with coverage
        run: PYTHONPATH=src uv run pytest tests/ --ignore=tests/regressions --cov=src --cov-fail-under=70 --cov-report=term-missing
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 7

  smoke:
    name: Smoke Tests
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/ui/package-lock.json
      - name: Install Python dependencies
        run: uv sync --all-extras
      - name: Install UI dependencies
        working-directory: src/ui
        run: npm ci
      - name: Run smoke tests
        run: make smoke

  scenario:
    name: Scenario Tests
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run scenario tests
        run: make scenario
      - name: Run scenario loop tests
        run: make scenario-loops

  regression:
    name: Regression Tests
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run regression tests
        run: PYTHONPATH=src uv run pytest tests/regressions/ -q

  audit:
    name: Principles Audit
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Resolve origin HEAD
        # actions/checkout leaves refs/remotes/origin/HEAD unset on PR
        # checkouts (which are a merge commit, not a fetched branch).
        # P5.5 (branch-protection probe) needs origin/HEAD to detect the
        # default branch, so fetch main explicitly and point HEAD at it.
        run: |
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          git symbolic-ref refs/remotes/origin/HEAD refs/remotes/origin/main
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run principles audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make audit

  ui-build:
    name: Dashboard Build
    needs: changes
    if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/ui/package-lock.json
      - name: Install dependencies
        working-directory: src/ui
        run: npm ci
      - name: Build
        working-directory: src/ui
        run: npm run build
      - name: Test
        working-directory: src/ui
        run: npm test

  sandbox:
    name: Sandbox Scenarios (PR B)
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      needs.changes.outputs.service_registry == 'true' ||
      needs.changes.outputs.orchestrator == 'true' ||
      needs.changes.outputs.mockworld == 'true' ||
      needs.changes.outputs.dockerfiles == 'true' ||
      needs.changes.outputs.compose == 'true' ||
      needs.changes.outputs.sandbox_scenarios == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install deps
        run: uv pip install --system -e ".[dev]"
      - name: Build sandbox images
        run: docker compose -f docker-compose.sandbox.yml build hydraflow ui playwright
      - name: Run s01_happy_single_issue
        run: python scripts/sandbox_scenario.py run s01_happy_single_issue
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-results
          path: /tmp/sandbox-results/
          retention-days: 7

